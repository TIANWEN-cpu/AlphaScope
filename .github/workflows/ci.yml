name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --prefer-binary -r requirements-dev.txt

    - name: Lint with ruff
      run: |
        ruff check backend/ frontend/ tests/ --output-format=github
        ruff format --check backend/ frontend/ tests/

    - name: Run tests
      env:
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
      run: |
        python -m pytest tests/ -v --tb=short

  web-build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: "npm"
        cache-dependency-path: apps/web/package-lock.json

    - name: Install dependencies
      working-directory: apps/web
      run: npm ci

    - name: Build
      working-directory: apps/web
      run: npm run build

    - name: Lint
      working-directory: apps/web
      run: npm run lint

  docker-build:
    runs-on: ubuntu-latest
    needs: [lint-and-test, web-build]

    steps:
    - uses: actions/checkout@v4

    - name: Build Docker image
      run: docker build -t ai-finance:test .

    - name: Verify Docker image
      run: docker run --rm ai-finance:test python -c "import backend; print('OK')"
