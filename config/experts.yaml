  - key: dalio
    name: 雷·达里奥
    style: 宏观对冲
    icon: "🌍"
    preferred_vendor: claude
    preferred_model: claude-sonnet-4-5
    focus_dims: [选股, 估值]
    stop_loss_style: 中等
