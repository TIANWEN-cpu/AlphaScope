output_schema: |
  必须严格按以下 JSON 返回,不要有任何前后说明:
  {
    "view": "核心观点(1-2 句)",
    "evidence": [
      {"type": "fundamental|technical|fund_flow|news|research|macro|sentiment|shareholder", "claim": "具体依据(含数字最佳)", "data_date": "YYYY-MM-DD"}
    ],
    "action": "买入|观望|减持|卖出",
    "position": 30,
    "stop_loss": 1500.0,
    "invalid_if": "什么情况说明判断失效(简短一句)",
    "risks": ["主要风险点1", "主要风险点2"]
  }
  其中:
  - view: 综合判断(必填)
  - evidence: 至少 2 条具体依据(基于提供的行情/资金/基本面数据);若不便结构化,允许字符串数组,系统会自动归一化
  - action: 必须是 "买入" / "观望" / "减持" / "卖出" 之一
  - position: 建议仓位百分比 0-100 整数
  - stop_loss: 建议止损价(元,数值类型),根据你的风格设定
  - invalid_if: 一句话的失效条件(可选)
  - risks: 1-3 条主要风险(可选)
