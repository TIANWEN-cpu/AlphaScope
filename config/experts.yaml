output_schema: |
  必须严格按以下 JSON 返回,不要有任何前后说明:
  {
    "view": "400 字以上的详细观点:核心逻辑链、关键数据引用、估值/技术依据、分歧与操作思路",
    "evidence": [
      {"type": "fundamental|technical|fund_flow|news|research|macro|sentiment|shareholder", "claim": "具体依据(含数字最佳)", "data_date": "YYYY-MM-DD"}
    ],
    "action": "买入|观望|减持|卖出",
    "position": 30,
    "stop_loss": 1500.0,
    "invalid_if": "什么情况说明判断失效",
    "risks": ["主要风险点1", "主要风险点2", "主要风险点3"]
  }
  其中:
  - view: 400 字以上的详细综合判断(必填):必须展开核心逻辑链、引用简报中的具体数据、说明估值/技术依据,并给出操作思路;禁止只写一两句话
  - evidence: 至少 3 条具体依据(基于提供的行情/资金/基本面数据),每条尽量含数字与日期;若不便结构化,允许字符串数组,系统会自动归一化
  - action: 必须是 "买入" / "观望" / "减持" / "卖出" 之一
  - position: 建议仓位百分比 0-100 整数
  - stop_loss: 建议止损价(元,数值类型),根据你的风格设定
  - invalid_if: 失效条件,说明什么信号出现时应推翻本判断(可选)
  - risks: 2-4 条主要风险(可选)
