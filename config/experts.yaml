# 研策中枢 AlphaScope v2.0 - 专家团配置
# 参考 workbuddy 专家团 manifest 格式
# 支持团队-成员层级、多语言、独立 promptFile、细粒度 API Key

version: "2.0"

# ============== 专家团列表 ==============
teams:
  - id: stock-partner
    displayName:
      zh: 股票合伙人团队
      en: Stock Partner Team
    description:
      zh: "十位专家一体分析：宏观、基本面、技术面、消息面、资金面、风控、反方、合规、总结"
      en: "Ten-expert integrated analysis: macro, fundamentals, technicals, sentiment, fund flow, risk, devil advocate, compliance, summarization"
    avatar: "🎩"
    promptFile: prompts/teams/stock-partner.md
    outputSchema: |
      必须严格按以下 JSON 返回,不要有任何前后说明:
      {
        "view": "核心观点(1-2 句)",
        "evidence": [
          {"type": "fundamental|technical|fund_flow|news|research|macro|sentiment|shareholder", "claim": "具体依据(含数字最佳)", "data_date": "YYYY-MM-DD"}
        ],
        "action": "买入|观望|减持|卖出",
        "position": 30,
        "stop_loss": 1500.0,
        "invalid_if": "什么情况说明判断失效(简短一句)",
        "risks": ["主要风险点1", "主要风险点2"]
      }
      evidence 至少 2 条;若不便给出结构化对象,允许直接用字符串数组(系统会自动归一化)。
    members:
      - id: buffett
        displayName:
          zh: 巴菲特派
          en: Buffett School
        profession:
          zh: 价值投资专家
          en: Value Investor
        avatar: "🎩"
        promptFile: prompts/experts/buffett.md
        role: lead
        provider: claude
        model: claude-sonnet-4-5
        focusDims: [护城河, ROE, 估值, 长期持有]
        stopLossStyle: 宽松

      - id: lynch
        displayName:
          zh: 林奇派
          en: Lynch School
        profession:
          zh: 成长投资专家
          en: Growth Investor
        avatar: "🌱"
        promptFile: prompts/experts/lynch.md
        role: member
        provider: gpt
        model: gpt-5.2
        focusDims: [营收增速, PEG, 行业景气, 业务可理解性]
        stopLossStyle: 中等

      - id: chanlun
        displayName:
          zh: 缠论派
          en: Chanlun School
        profession:
          zh: 技术分析专家
          en: Technical Analyst
        avatar: "📐"
        promptFile: prompts/experts/chanlun.md
        role: member
        provider: deepseek
        model: deepseek-chat
        focusDims: [中枢, 背驰, 走势级别, 量价配合]
        stopLossStyle: 严格

      - id: macro
        displayName:
          zh: 宏观官
          en: Macro Strategist
        profession:
          zh: 宏观策略专家
          en: Macro Strategist
        avatar: "🌐"
        promptFile: prompts/experts/macro.md
        role: member
        provider: mimo
        model: mimo-v2.5-pro
        focusDims: [流动性, 政策风向, 行业景气度, 海外联动]
        stopLossStyle: 中等

      - id: risk_officer
        displayName:
          zh: 风控官
          en: Risk Officer
        profession:
          zh: 风险控制专家
          en: Risk Control Officer
        avatar: "🛡️"
        promptFile: prompts/experts/risk_officer.md
        role: member
        provider: sensenova
        model: deepseek-v4-flash
        focusDims: [波动率, 回撤, 流动性, 主力撤离信号]
        stopLossStyle: 极严格

      - id: sentiment
        displayName:
          zh: 消息面分析师
          en: Sentiment Analyst
        profession:
          zh: 舆情与消息面专家
          en: News & Sentiment Expert
        avatar: "📰"
        promptFile: prompts/experts/sentiment.md
        role: member
        provider: deepseek
        model: deepseek-chat
        focusDims: [新闻情绪, 公告解读, 政策影响, 市场传闻]
        stopLossStyle: 中等

      - id: fund_flow
        displayName:
          zh: 资金面分析师
          en: Fund Flow Analyst
        profession:
          zh: 资金流向专家
          en: Capital Flow Expert
