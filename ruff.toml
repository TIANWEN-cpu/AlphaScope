# Ruff configuration for AI-Finance project
# https://docs.astral.sh/ruff/configuration/

[lint]
# Enable all rules by default
select = ["E", "F", "W"]

# Ignore E402 for files that need sys.path manipulation before imports
# Ignore E501 for Chinese-language projects with long strings
ignore = [
    "E402",  # Module level import not at top of file
    "E501",  # Line too long (Chinese strings)
]

[lint.per-file-ignores]
# Allow re-exports in __init__.py files
"backend/events/__init__.py" = ["F401"]
"backend/factors/__init__.py" = ["F401"]
"backend/providers/__init__.py" = ["F401"]
"backend/schemas/__init__.py" = ["F401"]
"backend/quality/__init__.py" = ["F401"]
"backend/storage/__init__.py" = ["F401"]
"backend/rag/__init__.py" = ["F401"]
"backend/observability/__init__.py" = ["F401"]
"backend/ingestion/__init__.py" = ["F401"]

# Probe scripts are not production code
"tests/probes/*" = ["E", "F", "W"]

[format]
quote-style = "double"
indent-style = "space"
