# AI-Finance Docker Compose (v0.12)
# Supports: App + Redis cache + optional ChromaDB

version: "3.8"

services:
  # Main app - Streamlit Dashboard
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-finance-app
    ports:
      - "8501:8501"
    volumes:
      - ./cache:/app/cache
      - ./reports:/app/reports
      - ./.env:/app/.env:ro
      - ./config:/app/config:ro
    environment:
      - PYTHONPATH=/app
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ai-finance-net

  # Redis cache layer
  redis:
    image: redis:7-alpine
    container_name: ai-finance-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    networks:
      - ai-finance-net

volumes:
  redis-data:

networks:
  ai-finance-net:
    driver: bridge
