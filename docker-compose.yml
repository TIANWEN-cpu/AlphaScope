# AI-Finance Docker Compose (v0.40.7)
# Services: Streamlit Dashboard + FastAPI API + Next.js Frontend + Redis cache
#
# Usage:
#   docker-compose up -d              # Start all services
#   docker-compose up -d app          # Streamlit only (port 8501)
#   docker-compose up -d api          # FastAPI only (port 8000)
#   docker-compose up -d web          # Next.js only (port 3000)
#   docker-compose up -d app api web  # All frontends

version: "3.8"

services:
  # Streamlit Dashboard (legacy UI, port 8501)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-finance-app
    ports:
      - "8501:8501"
    volumes:
      - ./cache:/app/cache
      - ./reports:/app/reports
      - ./.env:/app/.env:ro
      - ./config:/app/config:ro
    environment:
      - PYTHONPATH=/app
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ai-finance-net

  # FastAPI API Backend (port 8000)
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-finance-api
    command: ["python", "-m", "uvicorn", "backend.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    volumes:
      - ./cache:/app/cache
      - ./reports:/app/reports
      - ./.env:/app/.env:ro
      - ./config:/app/config:ro
    environment:
      - PYTHONPATH=/app
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - ai-finance-net

  # Next.js Frontend (port 3000)
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: ai-finance-web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    networks:
      - ai-finance-net

  # Redis cache layer
  redis:
    image: redis:7-alpine
    container_name: ai-finance-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    networks:
      - ai-finance-net

volumes:
  redis-data:

networks:
  ai-finance-net:
    driver: bridge
